<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青春纪 - 个人动漫收藏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-color: #f9f5ff;
            --text-color: #333;
            --card-bg: white;
            --header-gradient: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            --border-color: #ddd;
            --shadow-color: rgba(0,0,0,0.1);
        }
        [data-theme="dark"] {
            --bg-color: #1a1a2e;
            --text-color: #eee;
            --card-bg: #16213e;
            --header-gradient: linear-gradient(135deg, #e94560, #0f3460);
            --border-color: #444;
            --shadow-color: rgba(0,0,0,0.3);
        }
        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
        }
        #sakura-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        header {
            background: var(--header-gradient);
            color: white;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px var(--shadow-color);
            position: relative;
        }
        
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        
        .nav-link {
            color: white;
            text-decoration: none;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        
        .nav-link:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .header-controls {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
        }
        .theme-toggle, .sakura-toggle {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }
        .theme-toggle:hover, .sakura-toggle:hover {
            background: rgba(255,255,255,0.3);
        }
        h1 { font-size: 3em; margin-bottom: 10px; font-weight: bold; }
        .subtitle { font-size: 1.2em; opacity: 0.9; }
        .stats-section {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-item {
            background: var(--card-bg);
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 2px 10px var(--shadow-color);
            text-align: center;
            transition: transform 0.3s ease;
        }
        .stat-item:hover { transform: translateY(-3px); }
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #ff6b6b;
            transition: all 0.3s ease;
        }
        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }
        [data-theme="dark"] .stat-label { color: #aaa; }
        .category-section { margin-bottom: 30px; }
        .category-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .category-tab {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px var(--shadow-color);
        }
        .category-tab.active {
            background-color: #ff6b6b;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(255,107,107,0.4);
        }
        .ranking-section {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 10px var(--shadow-color);
            margin-bottom: 30px;
        }
        .ranking-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .ranking-controls { display: flex; gap: 10px; }
        .ranking-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
            background: #e0e0e0;
            color: #333;
        }
        .ranking-btn.active { background: #ff6b6b; color: white; }
        [data-theme="dark"] .ranking-btn { background: #333; color: #eee; }
        .ranking-list { display: flex; flex-direction: column; gap: 10px; }
        .ranking-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            background: var(--bg-color);
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .ranking-item:hover { transform: translateX(5px); }
        .ranking-number {
            font-size: 1.5em;
            font-weight: bold;
            color: #ff6b6b;
            min-width: 30px;
        }
        .ranking-thumb {
            width: 50px;
            height: 70px;
            object-fit: cover;
            border-radius: 5px;
        }
        .ranking-info { flex: 1; }
        .ranking-name { font-weight: bold; margin-bottom: 3px; }
        .ranking-score { color: #ff9800; font-size: 0.9em; }
        .ranking-date { color: #999; font-size: 0.85em; }
        .expand-btn {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .expand-btn:hover {
            background: #f0f0f0;
        }
        
        [data-theme="dark"] .expand-btn:hover { background: #2a2a4a; }
        
        /* 角色墙样式 */
        .character-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .search-box {
            flex: 1;
            min-width: 200px;
        }
        
        .search-box input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background: var(--card-bg);
            color: var(--text-color);
        }
        
        .filter-box {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .filter-box select {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background: var(--card-bg);
            color: var(--text-color);
        }
        
        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .character-card {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 10px var(--shadow-color);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .character-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px var(--shadow-color);
        }
        
        .character-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
        
        .character-card-content {
            padding: 15px;
        }
        
        .character-card h3 {
            margin-bottom: 5px;
            color: var(--text-color);
        }
        
        .character-card p {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }
        
        /* 角色详情模态框 */
        .character-modal {
            display: none;
            position: fixed;
            z-index: 1001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            overflow-y: auto;
        }
        
        .modal-content {
            background-color: var(--card-bg);
            margin: 5% auto;
            padding: 20px;
            border-radius: 10px;
            width: 80%;
            max-width: 800px;
            position: relative;
        }
        
        .close {
            color: var(--text-color);
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .close:hover {
            color: #ff6b6b;
        }
        
        .character-header {
            position: relative;
            margin-bottom: 20px;
        }
        
        .character-bg {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
        }
        
        .character-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: white;
            padding: 20px;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
        }
        
        .character-avatar {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid white;
            object-fit: cover;
        }
        
        .character-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .action-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid white;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .action-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .character-description {
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .comments-section {
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }
        
        .comment-input {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .comment-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background: var(--card-bg);
            color: var(--text-color);
        }
        
        .comment-input button {
            padding: 10px 20px;
            background: var(--header-gradient);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .comment-input button:hover {
            opacity: 0.9;
        }
        
        .comments-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .comment-item {
            padding: 10px;
            background: rgba(0,0,0,0.05);
            border-radius: 5px;
        }
        
        .comment-user {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .comment-text {
            margin-bottom: 5px;
        }
        
        .comment-time {
            font-size: 0.8em;
            color: #999;
        }
        
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .anime-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 10px var(--shadow-color);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }
        .anime-card:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px var(--shadow-color);
        }
        .anime-image {
            width: 100%;
            height: 280px;
            object-fit: cover;
            background-color: #e0e0e0;
        }
        .anime-name {
            padding: 15px;
            font-size: 1.1em;
            font-weight: bold;
            text-align: center;
            color: #ff6b6b;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .anime-actions {
            display: flex;
            gap: 10px;
            padding: 10px 15px;
            background-color: var(--bg-color);
            border-top: 1px solid var(--border-color);
        }
        .add-anime-section, .sync-section {
            margin-top: 40px;
            padding: 25px;
            background-color: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 2px 10px var(--shadow-color);
        }
        h2 { margin-bottom: 20px; color: var(--text-color); text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--text-color); }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1em;
            background: var(--card-bg);
            color: var(--text-color);
        }
        textarea { resize: vertical; min-height: 80px; }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn-primary { background-color: #4ecdc4; color: white; width: 100%; }
        .btn-danger { background-color: #ff6b6b; color: white; flex: 1; }
        .btn-secondary { background-color: #666; color: white; flex: 1; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .message {
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        .message-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .message-error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .empty-state h3 { margin-bottom: 10px; color: var(--text-color); }
        .search-section { margin-bottom: 20px; }
        .search-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 25px;
            font-size: 1em;
            box-shadow: 0 2px 5px var(--shadow-color);
            background: var(--card-bg);
            color: var(--text-color);
        }
        .sync-buttons { display: flex; gap: 15px; flex-wrap: wrap; }
        .btn-export { background-color: #2196F3; color: white; flex: 1; min-width: 120px; }
        .btn-import { background-color: #FF9800; color: white; flex: 1; min-width: 120px; }
        .music-toggle {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }
        .music-toggle:hover {
            background: rgba(255,255,255,0.3);
        }
        .music-toggle.playing {
            background: rgba(78,205,196,0.8);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        /* 轮盘精灵组件 */
        .roulette-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            pointer-events: none;
        }
        
        .roulette-button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border: 4px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            color: white;
            transition: all 0.3s ease;
            pointer-events: auto;
            position: relative;
            overflow: hidden;
        }
        
        .roulette-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        
        .roulette-button:active {
            transform: scale(0.95);
        }
        
        .roulette-wheel {
            position: absolute;
            bottom: 100px;
            right: 0;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f9f5ff, #e8f5e8);
            border: 4px solid #ff6b6b;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none;
            pointer-events: auto;
            animation: fadeIn 0.3s ease;
        }
        
        [data-theme="dark"] .roulette-wheel {
            background: linear-gradient(135deg, #16213e, #1a1a2e);
            border-color: #4ecdc4;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .roulette-wheel.show {
            display: block;
        }
        
        .wheel-inner {
            width: 100%;
            height: 100%;
            position: relative;
            border-radius: 50%;
            overflow: hidden;
        }
        
        .wheel-segment {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
        }
        
        .wheel-arrow {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 25px solid #ff6b6b;
            z-index: 10;
        }
        
        .roulette-result {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: bold;
            text-align: center;
            min-width: 200px;
            display: none;
            animation: slideDown 0.5s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 20;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translate(-50%, -20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        
        .roulette-result.show {
            display: block;
        }
        
        .roulette-history {
            position: absolute;
            bottom: 100px;
            left: -250px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 15px;
            width: 230px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: none;
            animation: slideInLeft 0.3s ease;
        }
        
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .roulette-history.show {
            display: block;
        }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .history-title {
            font-weight: bold;
            color: var(--text-color);
        }
        
        .history-close {
            background: none;
            border: none;
            font-size: 1.2em;
            cursor: pointer;
            color: var(--text-color);
        }
        
        .history-list {
            max-height: 200px;
            overflow-y: auto;
        }
        
        .history-item {
            padding: 8px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9em;
            color: var(--text-color);
        }
        
        .history-item:last-child {
            border-bottom: none;
        }
        
        .history-date {
            font-size: 0.8em;
            color: #999;
            margin-top: 2px;
        }
        
        .roulette-controls {
            position: absolute;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }
        
        .control-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: var(--card-bg);
            color: var(--text-color);
            cursor: pointer;
            font-size: 0.9em;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        
        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .roulette-container {
                bottom: 20px;
                right: 20px;
            }
            
            .roulette-button {
                width: 60px;
                height: 60px;
                font-size: 1.5em;
            }
            
            .roulette-wheel {
                width: 250px;
                height: 250px;
                bottom: 80px;
            }
            
            .roulette-history {
                left: -200px;
                width: 180px;
            }
        }
        
        /* 自动补全下拉框 */
        .autocomplete-container { position: relative; }
        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 4px 10px var(--shadow-color);
        }
        .autocomplete-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s;
        }
        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:hover { background: var(--bg-color); }
        .autocomplete-thumb { width: 40px; height: 55px; object-fit: cover; border-radius: 3px; }
        .autocomplete-info { flex: 1; }
        .autocomplete-name { font-weight: bold; font-size: 0.95em; }
        .autocomplete-date { font-size: 0.8em; color: #999; }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,107,107,0.3);
            border-radius: 50%;
            border-top-color: #ff6b6b;
            animation: spin 1s ease-in-out infinite;
        }

        /* 详情页 */
        .detail-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;

            z-index: 2000;

            position: relative;

        .detail-cover {
            width: 100%;
            height: 400px;
            object-fit: cover;
        }

            margin-bottom: 15px;

        .detail-section { margin-bottom: 20px; }
        .detail-section h3 {
            color: var(--text-color);
            margin-bottom: 10px;
            font-size: 1.2em;
        }
        .detail-description {
            color: var(--text-color);

        .character-list {
            display: flex;

        .character-item {
            min-width: 80px;
            text-align: center;
        }
        .character-img {
            width: 80px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 5px;
        }
        .character-name { font-size: 0.85em; color: var(--text-color); }
        .detail-actions {
            display: flex;

        }
        
        @media (max-width: 768px) {
            .container { padding: 10px; }

        <div class="search-section">

        <div class="ranking-section section">

            <div class="character-controls">

                                    <button class="action-btn favorite-btn" onclick="toggleFavorite()"><span id="modal-favorites">0</span> ⭐</button>

    </div>

    <script>

        // 保存角色数据
        function saveCharacters() {
            localStorage.setItem('characters', JSON.stringify(characters));
        }
        
        // 显示/隐藏不同部分
        function showSection(section) {
            // 隐藏所有部分
            document.querySelectorAll('.section').forEach(s => {
                s.style.display = 'none';
            });
            
            // 显示指定部分
            if (section === 'main') {
                document.querySelector('.stats-section').style.display = 'flex';
                document.querySelector('.add-anime-section').style.display = 'block';
                document.querySelector('.category-section').style.display = 'block';
                document.querySelector('.ranking-section').style.display = 'block';
                document.querySelector('.sync-section').style.display = 'block';
            } else if (section === 'character-wall') {
                document.getElementById('character-wall').style.display = 'block';
                renderCharacters();
            } else if (section === 'ranking') {
                document.querySelector('.stats-section').style.display = 'flex';
                document.querySelector('.ranking-section').style.display = 'block';
                updateRanking();
            }
        }
        
        // 渲染角色卡片
        function renderCharacters(filteredCharacters = characters) {
            const characterGrid = document.getElementById('character-grid');
            characterGrid.innerHTML = '';
            
            if (filteredCharacters.length === 0) {
                characterGrid.innerHTML = '<p style="text-align: center; grid-column: 1 / -1;">没有找到匹配的角色</p>';
                return;
            }
            
            filteredCharacters.forEach(character => {
                const card = document.createElement('div');
                card.className = 'character-card';
                card.onclick = () => openCharacterModal(character);
                card.innerHTML = `
                    <img src="${character.image}" alt="${character.name}">
                    <div class="character-card-content">
                        <h3>${character.name}</h3>
                        <p>${character.series}</p>
                        <p>${character.type}</p>
                    </div>
                `;
                characterGrid.appendChild(card);
            });
        }
        
        // 搜索和筛选角色
        function filterCharacters() {
            const searchText = document.getElementById('character-search').value.toLowerCase();
            const seriesFilter = document.getElementById('character-series').value;
            const typeFilter = document.getElementById('character-type').value;
            
            const filtered = characters.filter(character => {
                const matchesSearch = character.name.toLowerCase().includes(searchText) || 
                                     character.series.toLowerCase().includes(searchText);
                const matchesSeries = !seriesFilter || character.series === seriesFilter;
                const matchesType = !typeFilter || character.type === typeFilter;
                return matchesSearch && matchesSeries && matchesType;
            });
            
            renderCharacters(filtered);
        }
        
        // 打开角色详情模态框
        let currentCharacter = null;
        function openCharacterModal(character) {
            currentCharacter = character;
            const modal = document.getElementById('character-modal');
            
            // 填充模态框数据
            document.getElementById('modal-name').textContent = character.name;
            document.getElementById('modal-series').textContent = `作品: ${character.series}`;
            document.getElementById('modal-type').textContent = `类型: ${character.type}`;
            document.getElementById('modal-likes').textContent = character.likes;
            document.getElementById('modal-favorites').textContent = character.favorites;
            document.getElementById('modal-description').textContent = character.description;
            document.getElementById('modal-bg').src = character.bgImage;
            document.getElementById('modal-avatar').src = character.image;
            
            // 渲染评论
            const commentsList = document.getElementById('modal-comments');
            commentsList.innerHTML = '';
            character.comments.forEach(comment => {
                const commentItem = document.createElement('div');
                commentItem.className = 'comment-item';
                commentItem.innerHTML = `
                    <div class="comment-user">${comment.user}</div>
                    <div class="comment-text">${comment.text}</div>
                    <div class="comment-time">${comment.time}</div>
                `;
                commentsList.appendChild(commentItem);
            });
            
            modal.style.display = 'block';
        }
        
        // 关闭角色详情模态框
        function closeCharacterModal() {
            document.getElementById('character-modal').style.display = 'none';
            currentCharacter = null;
        }
        
        // 点赞功能
        function toggleLike() {
            if (currentCharacter) {
                currentCharacter.likes++;
                document.getElementById('modal-likes').textContent = currentCharacter.likes;
                saveCharacters();
            }
        }
        
        // 收藏功能
        function toggleFavorite() {
            if (currentCharacter) {
                currentCharacter.favorites++;
                document.getElementById('modal-favorites').textContent = currentCharacter.favorites;
                saveCharacters();
            }
        }
        
        // 分享功能
        function shareCharacter() {
            if (currentCharacter) {
                const shareText = `来看看${currentCharacter.name} - 来自《${currentCharacter.series}》的角色！`;
                if (navigator.share) {
                    navigator.share({
                        title: currentCharacter.name,
                        text: shareText,
                        url: window.location.href
                    });
                } else {
                    // 复制到剪贴板
                    navigator.clipboard.writeText(shareText);
                    alert('分享链接已复制到剪贴板！');
                }
            }
        }
        
        // 添加评论
        function addComment() {
            const commentText = document.getElementById('comment-text').value;
            if (commentText && currentCharacter) {
                const newComment = {
                    id: Date.now(),
                    user: "我",
                    text: commentText,
                    time: new Date().toLocaleString('zh-CN')
                };
                currentCharacter.comments.push(newComment);
                
                // 更新评论列表
                const commentsList = document.getElementById('modal-comments');
                const commentItem = document.createElement('div');
                commentItem.className = 'comment-item';
                commentItem.innerHTML = `
                    <div class="comment-user">${newComment.user}</div>
                    <div class="comment-text">${newComment.text}</div>
                    <div class="comment-time">${newComment.time}</div>
                `;

        async function searchBangumi(keyword) {
            if (!keyword || keyword.length < 2) {
                document.getElementById('autocompleteList').style.display = 'none';

            if (bangumiCache[keyword]) {
                showAutocomplete(bangumiCache[keyword]);
                return;
            }
            
            try {
                const response = await fetch(`https://api.bgm.tv/v0/search/subject/${encodeURIComponent(keyword)}?type=2&limit=10`);
                if (!response.ok) throw new Error('API请求失败');
                const data = await response.json();
                const results = data.data || [];
                bangumiCache[keyword] = results;
                showAutocomplete(results);
            } catch (error) {
                console.error('搜索失败:', error);
                document.getElementById('autocompleteList').style.display = 'none';
            }
        }

        function renderRoulette() {

                wheelInner.innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100%; font-size: 14px; text-align: center; padding: 20px;">暂无动漫数据<br>请先添加动漫</div>';
                return;
            }
            
            wheelInner.innerHTML = '';
            const segmentCount = Math.min(animes.length, 8);
            const anglePerSegment = 360 / segmentCount;
            
            for (let i = 0; i < segmentCount; i++) {
                const segment = document.createElement('div');
                segment.className = 'wheel-segment';
                
                const angle = i * anglePerSegment;
                segment.style.transform = `rotate(${angle}deg) skewY(${90 - anglePerSegment}deg)`;
                segment.style.backgroundColor = wheelColors[i % wheelColors.length];
                segment.style.color = '#fff';
                
                const anime = animes[i];
                segment.textContent = anime.name.length > 10 ? anime.name.substring(0, 10) + '...' : anime.name;

        function spinRoulette() {
            if (isSpinning || animes.length === 0) return;
            
            isSpinning = true;
            playRouletteSound('开始转动~');
            
            const segmentCount = Math.min(animes.length, 8);
            const anglePerSegment = 360 / segmentCount;
            
            // 随机角度（至少转3圈）
            const randomAngle = 360 * 3 + Math.random() * 360;
            const finalAngle = randomAngle % 360;
            
            // 计算最终指向的动漫
            const selectedIndex = Math.floor((360 - finalAngle) / anglePerSegment) % segmentCount;
            const selectedAnime = animes[selectedIndex];
            
            // 动画效果 - 精确控制在5秒
            let currentAngle = 0;
            const totalDuration = 5000; // 5秒
            const startTime = Date.now();
            
            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / totalDuration, 1);
                
                // 缓动函数：先加速后减速
                let easeProgress;
                if (progress < 0.5) {
                    // 前半段加速
                    easeProgress = 2 * progress * progress;
                } else {
                    // 后半段减速
                    easeProgress = 1 - Math.pow(-2 * progress + 2, 2) / 2;
                }
                
                // 计算当前角度
                currentAngle = randomAngle * easeProgress;
                wheelInner.style.transform = `rotate(${currentAngle}deg)`;
                
                if (elapsed < totalDuration) {
                    requestAnimationFrame(animate);
                } else {
                    // 停止转动
                    wheelInner.style.transform = `rotate(${randomAngle}deg)`;
                    isSpinning = false;
                    showRouletteResult(selectedAnime);
                }
            }
            
            animate();
        }

        function toggleSakura() {
            sakuraEnabled = !sakuraEnabled;
            document.querySelector('.sakura-toggle').textContent = sakuraEnabled ? '🌸' : '✖️';
            if (!sakuraEnabled) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }
        
        const canvas = document.getElementById('sakura-canvas');
        const ctx = canvas.getContext('2d');
        let sakuras = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        class Sakura {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -100;
                this.size = Math.random() * 8 + 4;
                this.speedY = Math.random() * 2 + 1;
                this.speedX = Math.random() * 1 - 0.5;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 2 - 1;
                this.opacity = Math.random() * 0.5 + 0.3;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX + Math.sin(this.y * 0.01) * 0.5;
                this.rotation += this.rotationSpeed;
                if (this.y > canvas.height + 10) this.reset();
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = `hsl(340, 80%, ${70 + Math.random() * 20}%)`;
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const angle = (i * 72) * Math.PI / 180;
                    const x = Math.cos(angle) * this.size;
                    const y = Math.sin(angle) * this.size * 0.6;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }
        
        canvas.addEventListener('mousemove', function(e) {
            if (!sakuraEnabled) return;
            for (let i = 0; i < 3; i++) {
                const s = new Sakura();
                s.x = e.clientX + Math.random() * 50 - 25;
                s.y = e.clientY + Math.random() * 50 - 25;
                sakuras.push(s);
            }
        });
        
        function animateSakura() {
            if (sakuraEnabled) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (sakuras.length < 50) {
                    for (let i = 0; i < 3; i++) sakuras.push(new Sakura());
                }
                sakuras.forEach(s => { s.update(); s.draw(); });
            }
            requestAnimationFrame(animateSakura);
        }
        animateSakura();
        
        // 初始化
        if (localStorage.getItem('theme') === 'dark') {
            document.body.dataset.theme = 'dark';
            document.querySelector('.theme-toggle').textContent = '☀️';
        }
        
        if (localStorage.getItem('musicEnabled') === 'true') {
            musicEnabled = true;
            const btn = document.getElementById('musicToggle');
            btn.classList.add('playing');
            btn.textContent = '🔊';
            // 音乐播放需要用户交互，所以不自动播放
        }
        
        updateStats();
        renderRanking();
        renderAnimes();
    </script>
</body>
</html>
