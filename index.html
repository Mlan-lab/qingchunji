<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青春纪 - 个人动漫收藏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-color: #f9f5ff;
            --text-color: #333;
            --card-bg: white;
            --header-gradient: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            --border-color: #ddd;
            --shadow-color: rgba(0,0,0,0.1);
        }
        [data-theme="dark"] {
            --bg-color: #1a1a2e;
            --text-color: #eee;
            --card-bg: #16213e;
            --header-gradient: linear-gradient(135deg, #e94560, #0f3460);
            --border-color: #444;
            --shadow-color: rgba(0,0,0,0.3);
        }
        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
        }
        #sakura-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        header {
            background: var(--header-gradient);
            color: white;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px var(--shadow-color);
            position: relative;
        }
        .header-controls {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
        }
        .theme-toggle, .sakura-toggle {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }
        .theme-toggle:hover, .sakura-toggle:hover {
            background: rgba(255,255,255,0.3);
        }
        h1 { font-size: 3em; margin-bottom: 10px; font-weight: bold; }
        .subtitle { font-size: 1.2em; opacity: 0.9; }
        .stats-section {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-item {
            background: var(--card-bg);
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 2px 10px var(--shadow-color);
            text-align: center;
            transition: transform 0.3s ease;
        }
        .stat-item:hover { transform: translateY(-3px); }
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #ff6b6b;
            transition: all 0.3s ease;
        }
        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }
        [data-theme="dark"] .stat-label { color: #aaa; }
        .category-section { margin-bottom: 30px; }
        .category-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .category-tab {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px var(--shadow-color);
        }
        .category-tab.active {
            background-color: #ff6b6b;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(255,107,107,0.4);
        }
        .ranking-section {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 10px var(--shadow-color);
            margin-bottom: 30px;
        }
        .ranking-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .ranking-controls { display: flex; gap: 10px; }
        .ranking-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
            background: #e0e0e0;
            color: #333;
        }
        .ranking-btn.active { background: #ff6b6b; color: white; }
        [data-theme="dark"] .ranking-btn { background: #333; color: #eee; }
        .ranking-list { display: flex; flex-direction: column; gap: 10px; }
        .ranking-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            background: var(--bg-color);
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .ranking-item:hover { transform: translateX(5px); }
        .ranking-number {
            font-size: 1.5em;
            font-weight: bold;
            color: #ff6b6b;
            min-width: 30px;
        }
        .ranking-thumb {
            width: 50px;
            height: 70px;
            object-fit: cover;
            border-radius: 5px;
        }
        .ranking-info { flex: 1; }
        .ranking-name { font-weight: bold; margin-bottom: 3px; }
        .ranking-score { color: #ff9800; font-size: 0.9em; }
        .ranking-date { color: #999; font-size: 0.85em; }
        .expand-btn {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .expand-btn:hover {
            background: #f0f0f0;
        }
        [data-theme="dark"] .expand-btn:hover { background: #2a2a4a; }
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .anime-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 10px var(--shadow-color);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }
        .anime-card:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px var(--shadow-color);
        }
        .anime-image {
            width: 100%;
            height: 280px;
            object-fit: cover;
            background-color: #e0e0e0;
        }
        .anime-name {
            padding: 15px;
            font-size: 1.1em;
            font-weight: bold;
            text-align: center;
            color: #ff6b6b;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .anime-actions {
            display: flex;
            gap: 10px;
            padding: 10px 15px;
            background-color: var(--bg-color);
            border-top: 1px solid var(--border-color);
        }
        .add-anime-section, .sync-section {
            margin-top: 40px;
            padding: 25px;
            background-color: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 2px 10px var(--shadow-color);
        }
        h2 { margin-bottom: 20px; color: var(--text-color); text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--text-color); }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1em;
            background: var(--card-bg);
            color: var(--text-color);
        }
        textarea { resize: vertical; min-height: 80px; }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn-primary { background-color: #4ecdc4; color: white; width: 100%; }
        .btn-danger { background-color: #ff6b6b; color: white; flex: 1; }
        .btn-secondary { background-color: #666; color: white; flex: 1; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .message {
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        .message-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .message-error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .empty-state h3 { margin-bottom: 10px; color: var(--text-color); }
        .search-section { margin-bottom: 20px; }
        .search-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 25px;
            font-size: 1em;
            box-shadow: 0 2px 5px var(--shadow-color);
            background: var(--card-bg);
            color: var(--text-color);
        }
        .sync-buttons { display: flex; gap: 15px; flex-wrap: wrap; }
        .btn-export { background-color: #2196F3; color: white; flex: 1; min-width: 120px; }
        .btn-import { background-color: #FF9800; color: white; flex: 1; min-width: 120px; }
        .music-toggle {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }
        .music-toggle:hover {
            background: rgba(255,255,255,0.3);
        }
        .music-toggle.playing {
            background: rgba(78,205,196,0.8);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        /* 轮盘精灵组件 */
        .roulette-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            pointer-events: none;
        }
        
        .roulette-button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border: 4px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            color: white;
            transition: all 0.3s ease;
            pointer-events: auto;
            position: relative;
            overflow: hidden;
        }
        
        .roulette-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        
        .roulette-button:active {
            transform: scale(0.95);
        }
        
        .roulette-wheel {
            position: absolute;
            bottom: 100px;
            right: 0;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f9f5ff, #e8f5e8);
            border: 4px solid #ff6b6b;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none;
            pointer-events: auto;
            animation: fadeIn 0.3s ease;
        }
        
        [data-theme="dark"] .roulette-wheel {
            background: linear-gradient(135deg, #16213e, #1a1a2e);
            border-color: #4ecdc4;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .roulette-wheel.show {
            display: block;
        }
        
        .wheel-inner {
            width: 100%;
            height: 100%;
            position: relative;
            border-radius: 50%;
            overflow: hidden;
        }
        
        .wheel-segment {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
        }
        
        .wheel-arrow {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 25px solid #ff6b6b;
            z-index: 10;
        }
        
        .roulette-result {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            text-align: center;
            min-width: 200px;
            display: none;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translate(-50%, 20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        
        .roulette-result.show {
            display: block;
        }
        
        .roulette-history {
            position: absolute;
            bottom: 100px;
            left: -250px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 15px;
            width: 230px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: none;
            animation: slideInLeft 0.3s ease;
        }
        
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .roulette-history.show {
            display: block;
        }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .history-title {
            font-weight: bold;
            color: var(--text-color);
        }
        
        .history-close {
            background: none;
            border: none;
            font-size: 1.2em;
            cursor: pointer;
            color: var(--text-color);
        }
        
        .history-list {
            max-height: 200px;
            overflow-y: auto;
        }
        
        .history-item {
            padding: 8px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9em;
            color: var(--text-color);
        }
        
        .history-item:last-child {
            border-bottom: none;
        }
        
        .history-date {
            font-size: 0.8em;
            color: #999;
            margin-top: 2px;
        }
        
        .roulette-controls {
            position: absolute;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }
        
        .control-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: var(--card-bg);
            color: var(--text-color);
            cursor: pointer;
            font-size: 0.9em;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        
        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .roulette-container {
                bottom: 20px;
                right: 20px;
            }
            
            .roulette-button {
                width: 60px;
                height: 60px;
                font-size: 1.5em;
            }
            
            .roulette-wheel {
                width: 250px;
                height: 250px;
                bottom: 80px;
            }
            
            .roulette-history {
                left: -200px;
                width: 180px;
            }
        }
        
        /* 自动补全下拉框 */
        .autocomplete-container { position: relative; }
        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 4px 10px var(--shadow-color);
        }
        .autocomplete-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s;
        }
        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:hover { background: var(--bg-color); }
        .autocomplete-thumb { width: 40px; height: 55px; object-fit: cover; border-radius: 3px; }
        .autocomplete-info { flex: 1; }
        .autocomplete-name { font-weight: bold; font-size: 0.95em; }
        .autocomplete-date { font-size: 0.8em; color: #999; }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,107,107,0.3);
            border-radius: 50%;
            border-top-color: #ff6b6b;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 详情页 */
        .detail-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .detail-page {
            background: var(--card-bg);
            border-radius: 15px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .detail-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5em;
            cursor: pointer;
            z-index: 10;
        }
        .detail-cover {
            width: 100%;
            height: 400px;
            object-fit: cover;
        }
        .detail-content { padding: 25px; }
        .detail-title {
            font-size: 2em;
            color: var(--text-color);
            margin-bottom: 15px;
        }
        .detail-score {
            font-size: 1.5em;
            color: #ff9800;
            margin-bottom: 15px;
        }
        .detail-score input {
            width: 80px;
            display: inline-block;
            margin-left: 10px;
            font-size: 1em;
        }
        .detail-section { margin-bottom: 20px; }
        .detail-section h3 {
            color: var(--text-color);
            margin-bottom: 10px;
            font-size: 1.2em;
        }
        .detail-description {
            color: var(--text-color);
            line-height: 1.6;
            background: var(--bg-color);
            padding: 15px;
            border-radius: 8px;
        }
        .detail-description textarea {
            width: 100%;
            min-height: 100px;
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px;
            resize: vertical;
        }
        .character-list {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
        }
        .character-item {
            min-width: 80px;
            text-align: center;
        }
        .character-img {
            width: 80px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 5px;
        }
        .character-name { font-size: 0.85em; color: var(--text-color); }
        .detail-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .save-indicator {
            color: #ff9800;
            font-size: 0.9em;
            margin-left: 10px;
        }
        
        @media (max-width: 768px) {
            .container { padding: 10px; }
            h1 { font-size: 2.2em; }
            .anime-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
            .anime-image { height: 220px; }
            .category-tabs { flex-direction: column; align-items: center; }
            .category-tab { width: 80%; text-align: center; }
            .stats-section { gap: 15px; }
            .stat-item { padding: 15px 20px; }
            .detail-cover { height: 250px; }
        }
    </style>
</head>
<body>
    <canvas id="sakura-canvas"></canvas>
    
    <div class="container">
        <header>
            <div class="header-controls">
                <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
                <button class="sakura-toggle" onclick="toggleSakura()">🌸</button>
                <button class="music-toggle" onclick="toggleMusic()" id="musicToggle">🎵</button>
            </div>
            <h1>青春纪</h1>
            <p class="subtitle">记录青春，收藏美好</p>
        </div>
        
        <div class="stats-section">
            <div class="stat-item">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">总收藏</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="japaneseCount">0</div>
                <div class="stat-label">日漫</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="chineseCount">0</div>
                <div class="stat-label">国漫</div>
            </div>
        </div>
        
        <div class="search-section">
            <input type="text" id="searchInput" class="search-input" placeholder="搜索动漫...">
        </div>
        
        <div class="ranking-section">
            <div class="ranking-header">
                <h2>排行榜</h2>
                <div class="ranking-controls">
                    <button class="ranking-btn active" data-sort="score" onclick="changeSort('score')">评分排序</button>
                    <button class="ranking-btn" data-sort="time" onclick="changeSort('time')">时间排序</button>
                </div>
            </div>
            <div class="ranking-list" id="rankingList"></div>
            <button class="expand-btn" id="expandBtn" onclick="toggleExpand()">展开全部</button>
        </div>
        
        <div class="category-section">
            <div class="category-tabs">
                <button class="category-tab active" data-category="all">全部</button>
                <button class="category-tab" data-category="japanese">日漫</button>
                <button class="category-tab" data-category="chinese">国漫</button>
            </div>
            <div class="anime-grid" id="animeGrid"></div>
        </div>
        
        <div class="add-anime-section">
            <h2>添加新动漫</h2>
            <form id="addAnimeForm">
                <div class="form-group autocomplete-container">
                    <label for="animeName">动漫番名 *</label>
                    <input type="text" id="animeName" required maxlength="50" placeholder="输入番名，自动匹配Bangumi...">
                    <div class="autocomplete-list" id="autocompleteList" style="display:none;"></div>
                </div>
                <div class="form-group" id="imagePreview" style="display:none;">
                    <label>图片预览</label>
                    <img id="previewImg" style="width:100%;max-height:200px;object-fit:contain;border-radius:8px;">
                </div>
                <div class="form-group">
                    <label for="animeImage">或上传本地图片</label>
                    <input type="file" id="animeImage" accept="image/*">
                </div>
                <div class="form-group">
                    <label for="animeCategory">分类 *</label>
                    <select id="animeCategory" required>
                        <option value="">请选择分类</option>
                        <option value="japanese">日漫</option>
                        <option value="chinese">国漫</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="animeScore">评分 (0-10)</label>
                    <input type="number" id="animeScore" min="0" max="10" step="0.1" value="8.0">
                </div>
                <div class="form-group">
                    <label for="animeDesc">简介</label>
                    <textarea id="animeDesc" placeholder="添加简介..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary">添加动漫</button>
            </form>
            <div id="message" class="message" style="display:none;"></div>
        </div>
        
        <div class="sync-section">
            <h2>数据同步</h2>
            <p style="margin-bottom: 15px; color: #666;">导出数据到文件，然后在其他设备上导入，实现数据同步</p>
            <div class="sync-buttons">
                <button class="btn btn-export" onclick="exportData()">导出数据</button>
                <button class="btn btn-import" onclick="document.getElementById('importFile').click()">导入数据</button>
                <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importData(this)">
            </div>
        </div>
    </div>
    
    <audio id="backgroundMusic" loop volume="0.2">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    
    <!-- 轮盘精灵组件 -->
    <div class="roulette-container">
        <button class="roulette-button" onclick="toggleRoulette()">🎰</button>
        <div class="roulette-wheel" id="rouletteWheel">
            <div class="wheel-arrow"></div>
            <div class="wheel-inner" id="wheelInner"></div>
            <div class="roulette-result" id="rouletteResult"></div>
            <div class="roulette-controls">
                <button class="control-btn" onclick="spinRoulette()">开始转动</button>
                <button class="control-btn" onclick="showHistory()">历史记录</button>
            </div>
        </div>
        <div class="roulette-history" id="rouletteHistory">
            <div class="history-header">
                <div class="history-title">推荐历史</div>
                <button class="history-close" onclick="hideHistory()">&times;</button>
            </div>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>
    
    <script>
        let animes = JSON.parse(localStorage.getItem('animes')) || [];
        let currentCategory = 'all';
        let currentSort = 'score';
        let rankingExpanded = false;
        let sakuraEnabled = true;
        let musicEnabled = false;
        let debounceTimer = null;
        let bangumiCache = {};
        let rouletteVisible = false;
        let isSpinning = false;
        
        const audio = document.getElementById('backgroundMusic');
        const rouletteWheel = document.getElementById('rouletteWheel');
        const rouletteResult = document.getElementById('rouletteResult');
        const rouletteHistory = document.getElementById('rouletteHistory');
        const wheelInner = document.getElementById('wheelInner');
        const historyList = document.getElementById('historyList');
        
        // 轮盘颜色
        const wheelColors = [
            '#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4',
            '#ffeaa7', '#dfe6e9', '#e17055', '#00b894'
        ];
        
        // 历史记录
        let rouletteHistoryData = JSON.parse(localStorage.getItem('rouletteHistory')) || [];
        
        function saveRouletteHistory() {
            localStorage.setItem('rouletteHistory', JSON.stringify(rouletteHistoryData));
        }
        
        function saveAnimes() {
            localStorage.setItem('animes', JSON.stringify(animes));
            updateStats();
            renderRanking();
            // 同步更新轮盘
            if (rouletteVisible) {
                renderRoulette();
            }
        }
        
        function updateStats() {
            const total = animes.length;
            const japanese = animes.filter(a => a.category === 'japanese').length;
            const chinese = animes.filter(a => a.category === 'chinese').length;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('japaneseCount').textContent = japanese;
            document.getElementById('chineseCount').textContent = chinese;
        }
        
        function renderRanking() {
            const rankingList = document.getElementById('rankingList');
            let sorted = [...animes];
            
            if (currentSort === 'score') {
                sorted.sort((a, b) => (b.score || 0) - (a.score || 0));
            } else {
                sorted.sort((a, b) => new Date(b.addedAt) - new Date(a.addedAt));
            }
            
            const displayCount = rankingExpanded ? sorted.length : 5;
            const displayAnimes = sorted.slice(0, displayCount);
            
            rankingList.innerHTML = displayAnimes.map((anime, i) => `
                <div class="ranking-item" onclick="openDetail(${animes.indexOf(anime)})">
                    <div class="ranking-number">${i + 1}</div>
                    <img src="${anime.image || 'data:image/svg+xml;base64,'}" class="ranking-thumb" alt="${anime.name}">
                    <div class="ranking-info">
                        <div class="ranking-name">${anime.name}</div>
                        ${currentSort === 'score' 
                            ? `<div class="ranking-score">⭐ ${(anime.score || 0).toFixed(1)} 分</div>`
                            : `<div class="ranking-date">${anime.addedAt || '未知'}</div>`
                        }
                    </div>
                </div>
            `).join('');
            
            document.getElementById('expandBtn').textContent = rankingExpanded ? '收起' : `展开全部 (${sorted.length})`;
            document.getElementById('expandBtn').style.display = sorted.length > 5 ? 'block' : 'none';
        }
        
        function changeSort(sortType) {
            currentSort = sortType;
            document.querySelectorAll('.ranking-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.sort === sortType);
            });
            renderRanking();
        }
        
        function toggleExpand() {
            rankingExpanded = !rankingExpanded;
            renderRanking();
        }
        
        function renderAnimes() {
            const animeGrid = document.getElementById('animeGrid');
            animeGrid.innerHTML = '';
            
            let filtered = animes;
            if (currentCategory !== 'all') {
                filtered = animes.filter(a => a.category === currentCategory);
            }
            
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (searchTerm) {
                filtered = filtered.filter(a => a.name.toLowerCase().includes(searchTerm));
            }
            
            if (filtered.length === 0) {
                animeGrid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <h3>暂无动漫</h3>
                        <p>快来添加你喜欢的动漫吧！</p>
                    </div>
                `;
                return;
            }
            
            filtered.forEach(anime => {
                const index = animes.indexOf(anime);
                const card = document.createElement('div');
                card.className = 'anime-card';
                card.onclick = () => openDetail(index);
                
                card.innerHTML = `
                    <img src="${anime.image || 'data:image/svg+xml;base64,'}" class="anime-image" alt="${anime.name}">
                    <div class="anime-name">${anime.name}</div>
                    <div class="anime-actions">
                        <button class="btn btn-danger" onclick="event.stopPropagation();deleteAnime(${index})">删除</button>
                        <button class="btn btn-secondary" onclick="event.stopPropagation();editAnimeForm(${index})">编辑</button>
                    </div>
                `;
                animeGrid.appendChild(card);
            });
        }
        
        function showMessage(text, isSuccess = true) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${isSuccess ? 'message-success' : 'message-error'}`;
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 3000);
        }
        
        function deleteAnime(index) {
            if (confirm('确定要删除这部动漫吗？')) {
                animes.splice(index, 1);
                saveAnimes();
                renderAnimes();
                showMessage('动漫删除成功');
            }
        }
        
        function editAnimeForm(index) {
            const anime = animes[index];
            document.getElementById('animeName').value = anime.name;
            document.getElementById('animeCategory').value = anime.category;
            document.getElementById('animeScore').value = anime.score || 8.0;
            document.getElementById('animeDesc').value = anime.description || '';
            if (anime.image) {
                document.getElementById('previewImg').src = anime.image;
                document.getElementById('imagePreview').style.display = 'block';
            }
            window.editingIndex = index;
            showMessage('请修改信息后点击添加按钮保存');
        }
        
        // Bangumi API 自动补全
        async function searchBangumi(keyword) {
            if (!keyword || keyword.length < 2) {
                document.getElementById('autocompleteList').style.display = 'none';
                return;
            }
            
            if (bangumiCache[keyword]) {
                showAutocomplete(bangumiCache[keyword]);
                return;
            }
            
            try {
                const response = await fetch(`https://api.bgm.tv/v0/search/subject/${encodeURIComponent(keyword)}?type=2&limit=10`);
                if (!response.ok) throw new Error('API请求失败');
                const data = await response.json();
                const results = data.data || [];
                bangumiCache[keyword] = results;
                showAutocomplete(results);
            } catch (error) {
                console.error('搜索失败:', error);
                document.getElementById('autocompleteList').style.display = 'none';
            }
        }
        
        function showAutocomplete(results) {
            const list = document.getElementById('autocompleteList');
            if (results.length === 0) {
                list.style.display = 'none';
                return;
            }
            
            list.innerHTML = results.map(item => `
                <div class="autocomplete-item" onclick="selectBangumi(${item.id})">
                    <img src="${item.images?.small || ''}" class="autocomplete-thumb" alt="${item.name}">
                    <div class="autocomplete-info">
                        <div class="autocomplete-name">${item.name}</div>
                        <div class="autocomplete-date">${item.date || ''} | ${item.rating?.score || '暂无评分'}</div>
                    </div>
                </div>
            `).join('');
            list.style.display = 'block';
        }
        
        async function selectBangumi(id) {
            try {
                const response = await fetch(`https://api.bgm.tv/v0/subjects/${id}`);
                if (!response.ok) throw new Error('获取详情失败');
                const data = await response.json();
                
                document.getElementById('animeName').value = data.name;
                document.getElementById('animeScore').value = data.rating?.score || 8.0;
                document.getElementById('animeDesc').value = data.summary || '';
                
                if (data.images?.large) {
                    document.getElementById('previewImg').src = data.images.large;
                    document.getElementById('imagePreview').style.display = 'block';
                    // 预加载图片
                    const img = new Image();
                    img.src = data.images.large;
                }
                
                document.getElementById('autocompleteList').style.display = 'none';
            } catch (error) {
                showMessage('获取详情失败，请重试', false);
            }
        }
        
        document.getElementById('animeName').addEventListener('input', function() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                searchBangumi(this.value.trim());
            }, 500);
        });
        
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.autocomplete-container')) {
                document.getElementById('autocompleteList').style.display = 'none';
            }
        });
        
        // 表单提交
        document.getElementById('addAnimeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('animeName').value.trim();
            const category = document.getElementById('animeCategory').value;
            const fileInput = document.getElementById('animeImage');
            const score = parseFloat(document.getElementById('animeScore').value) || 8.0;
            const description = document.getElementById('animeDesc').value.trim();
            
            if (!name || !category) {
                showMessage('请填写所有必填字段', false);
                return;
            }
            
            let image = null;
            const previewImg = document.getElementById('previewImg');
            if (previewImg.src && previewImg.src !== window.location.href) {
                image = previewImg.src;
            }
            
            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    saveAnimeData(name, category, e.target.result, score, description);
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                saveAnimeData(name, category, image, score, description);
            }
        });
        
        function saveAnimeData(name, category, image, score, description) {
            const animeData = {
                name,
                category,
                image,
                score,
                description,
                addedAt: new Date().toISOString().split('T')[0]
            };
            
            if (window.editingIndex !== undefined) {
                const existing = animes[window.editingIndex];
                if (!image) animeData.image = existing.image;
                animeData.characters = existing.characters || [];
                animes[window.editingIndex] = animeData;
                showMessage('动漫更新成功');
                window.editingIndex = undefined;
            } else {
                animeData.characters = [];
                animes.push(animeData);
                showMessage('动漫添加成功');
            }
            
            document.getElementById('addAnimeForm').reset();
            document.getElementById('imagePreview').style.display = 'none';
            saveAnimes();
            renderAnimes();
        }
        
        // 详情页
        function openDetail(index) {
            const anime = animes[index];
            if (!anime) return;
            
            const overlay = document.createElement('div');
            overlay.className = 'detail-overlay';
            overlay.id = 'detailOverlay';
            
            overlay.innerHTML = `
                <div class="detail-page">
                    <button class="detail-close" onclick="closeDetail()">&times;</button>
                    <img src="${anime.image || 'data:image/svg+xml;base64,'}" class="detail-cover" alt="${anime.name}">
                    <div class="detail-content">
                        <h2 class="detail-title">${anime.name}</h2>
                        <div class="detail-score">
                            评分: <span id="displayScore">${(anime.score || 0).toFixed(1)}</span>/10
                            <input type="number" id="editScore" value="${anime.score || 8.0}" min="0" max="10" step="0.1" style="width:70px;">
                            <span class="save-indicator" id="saveIndicator"></span>
                        </div>
                        <div class="detail-section">
                            <h3>简介</h3>
                            <div class="detail-description">
                                <textarea id="editDesc">${anime.description || ''}</textarea>
                            </div>
                        </div>
                        <div class="detail-section">
                            <h3>人物图片</h3>
                            <div class="character-list" id="characterList">
                                ${(anime.characters || []).map((c, i) => `
                                    <div class="character-item">
                                        <img src="${c.image}" class="character-img" alt="${c.name}">
                                        <div class="character-name">${c.name}</div>
                                        <button onclick="removeCharacter(${index}, ${i})" style="font-size:0.7em;color:red;">删除</button>
                                    </div>
                                `).join('')}
                                <div class="character-item" style="min-width:80px;">
                                    <button onclick="addCharacter(${index})" style="width:80px;height:100px;border:2px dashed #ccc;border-radius:8px;background:none;cursor:pointer;">+ 添加</button>
                                </div>
                            </div>
                        </div>
                        <div class="detail-actions">
                            <button class="btn btn-primary" onclick="saveDetail(${index})">保存修改</button>
                            <button class="btn btn-danger" onclick="deleteAnime(${index});closeDetail();">删除</button>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.appendChild(overlay);
            
            // 监听变化
            ['editScore', 'editDesc'].forEach(id => {
                document.getElementById(id).addEventListener('input', function() {
                    document.getElementById('saveIndicator').textContent = '● 未保存';
                });
            });
        }
        
        function closeDetail() {
            const overlay = document.getElementById('detailOverlay');
            if (overlay) overlay.remove();
        }
        
        document.addEventListener('click', function(e) {
            if (e.target.className === 'detail-overlay') closeDetail();
        });
        
        function saveDetail(index) {
            const score = parseFloat(document.getElementById('editScore').value) || 8.0;
            const description = document.getElementById('editDesc').value;
            
            animes[index].score = score;
            animes[index].description = description;
            
            saveAnimes();
            renderAnimes();
            document.getElementById('saveIndicator').textContent = '✓ 已保存';
            setTimeout(() => { document.getElementById('saveIndicator').textContent = ''; }, 2000);
        }
        
        function addCharacter(index) {
            const url = prompt('请输入人物图片URL:');
            if (!url) return;
            const name = prompt('请输入人物名称:') || '未知';
            
            if (!animes[index].characters) animes[index].characters = [];
            animes[index].characters.push({ image: url, name });
            saveAnimes();
            openDetail(index);
        }
        
        function removeCharacter(animeIndex, charIndex) {
            animes[animeIndex].characters.splice(charIndex, 1);
            saveAnimes();
            openDetail(animeIndex);
        }
        
        // 分类切换
        document.querySelectorAll('.category-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.dataset.category;
                renderAnimes();
            });
        });
        
        // 搜索
        document.getElementById('searchInput').addEventListener('input', renderAnimes);
        
        // 导出/导入
        function exportData() {
            const dataStr = JSON.stringify(animes, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `青春纪动漫数据_${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            URL.revokeObjectURL(url);
            showMessage('数据导出成功！');
        }
        
        function importData(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (Array.isArray(data)) {
                        if (confirm('导入数据将覆盖当前所有数据，确定要继续吗？')) {
                            animes = data;
                            saveAnimes();
                            renderAnimes();
                            showMessage('数据导入成功！');
                        }
                    } else {
                        showMessage('文件格式错误', false);
                    }
                } catch (error) {
                    showMessage('导入失败: ' + error.message, false);
                }
            };
            reader.readAsText(file);
            input.value = '';
        }
        
        // 主题切换
        function toggleTheme() {
            const isDark = document.body.dataset.theme === 'dark';
            document.body.dataset.theme = isDark ? '' : 'dark';
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
            document.querySelector('.theme-toggle').textContent = isDark ? '🌙' : '☀️';
        }
        
        // 樱花特效
        // 轮盘精灵功能
        function toggleRoulette() {
            rouletteVisible = !rouletteVisible;
            if (rouletteVisible) {
                rouletteWheel.classList.add('show');
                renderRoulette();
                // 播放转转声音
                playRouletteSound('转转~');
            } else {
                rouletteWheel.classList.remove('show');
                hideHistory();
            }
        }
        
        function renderRoulette() {
            if (animes.length === 0) {
                wheelInner.innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100%; font-size: 14px; text-align: center; padding: 20px;">暂无动漫数据<br>请先添加动漫</div>';
                return;
            }
            
            wheelInner.innerHTML = '';
            const segmentCount = Math.min(animes.length, 8);
            const anglePerSegment = 360 / segmentCount;
            
            for (let i = 0; i < segmentCount; i++) {
                const segment = document.createElement('div');
                segment.className = 'wheel-segment';
                
                const angle = i * anglePerSegment;
                segment.style.transform = `rotate(${angle}deg) skewY(${90 - anglePerSegment}deg)`;
                segment.style.backgroundColor = wheelColors[i % wheelColors.length];
                segment.style.color = '#fff';
                
                const anime = animes[i];
                segment.textContent = anime.name.length > 10 ? anime.name.substring(0, 10) + '...' : anime.name;
                
                wheelInner.appendChild(segment);
            }
        }
        
        function spinRoulette() {
            if (isSpinning || animes.length === 0) return;
            
            isSpinning = true;
            playRouletteSound('开始转动~');
            
            const segmentCount = Math.min(animes.length, 8);
            const anglePerSegment = 360 / segmentCount;
            
            // 随机角度（至少转3圈）
            const randomAngle = 360 * 3 + Math.random() * 360;
            const finalAngle = randomAngle % 360;
            
            // 计算最终指向的动漫
            const selectedIndex = Math.floor((360 - finalAngle) / anglePerSegment) % segmentCount;
            const selectedAnime = animes[selectedIndex];
            
            // 动画效果
            let currentAngle = 0;
            let speed = 10;
            const acceleration = 0.5;
            const decelerationStart = 2000;
            
            const startTime = Date.now();
            
            function animate() {
                const elapsed = Date.now() - startTime;
                
                if (elapsed < decelerationStart) {
                    // 加速阶段
                    speed += acceleration;
                } else {
                    // 减速阶段
                    speed = Math.max(0.5, speed - acceleration * 1.5);
                }
                
                currentAngle += speed;
                wheelInner.style.transform = `rotate(${currentAngle}deg)`;
                
                if (currentAngle < randomAngle) {
                    requestAnimationFrame(animate);
                } else {
                    // 停止转动
                    wheelInner.style.transform = `rotate(${randomAngle}deg)`;
                    isSpinning = false;
                    showRouletteResult(selectedAnime);
                }
            }
            
            animate();
        }
        
        function showRouletteResult(anime) {
            rouletteResult.textContent = `推荐：${anime.name}`;
            rouletteResult.classList.add('show');
            playRouletteSound(`推荐${anime.name}~`);
            
            // 记录历史
            addToHistory(anime);
            
            setTimeout(() => {
                rouletteResult.classList.remove('show');
            }, 3000);
        }
        
        function addToHistory(anime) {
            const historyItem = {
                name: anime.name,
                date: new Date().toLocaleString(),
                time: Date.now()
            };
            
            rouletteHistoryData.unshift(historyItem);
            if (rouletteHistoryData.length > 20) {
                rouletteHistoryData = rouletteHistoryData.slice(0, 20);
            }
            
            saveRouletteHistory();
            renderHistory();
        }
        
        function renderHistory() {
            if (rouletteHistoryData.length === 0) {
                historyList.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">暂无历史记录</div>';
                return;
            }
            
            historyList.innerHTML = rouletteHistoryData.map(item => `
                <div class="history-item">
                    ${item.name}
                    <div class="history-date">${item.date}</div>
                </div>
            `).join('');
        }
        
        function showHistory() {
            rouletteHistory.classList.add('show');
            renderHistory();
        }
        
        function hideHistory() {
            rouletteHistory.classList.remove('show');
        }
        
        function playRouletteSound(text) {
            // 使用Web Speech API播放语音
            if ('speechSynthesis' in window) {
                const speech = new SpeechSynthesisUtterance(text);
                speech.lang = 'zh-CN';
                speech.rate = 1.2;
                speech.pitch = 1.1;
                speech.volume = 0.6;
                speechSynthesis.speak(speech);
            }
        }
        
        function toggleMusic() {
            musicEnabled = !musicEnabled;
            const btn = document.getElementById('musicToggle');
            
            if (musicEnabled) {
                audio.loop = true;
                audio.volume = 0.2;
                
                // 尝试播放音乐
                audio.currentTime = 0;
                const playPromise = audio.play();
                
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        btn.classList.add('playing');
                        btn.textContent = '🔊';
                    }).catch(error => {
                        console.log('播放错误:', error);
                        showMessage('音乐播放需要用户交互，请再次点击按钮', false);
                        musicEnabled = false;
                    });
                } else {
                    // 旧浏览器
                    btn.classList.add('playing');
                    btn.textContent = '🔊';
                }
            } else {
                audio.pause();
                btn.classList.remove('playing');
                btn.textContent = '🎵';
            }
            
            localStorage.setItem('musicEnabled', musicEnabled);
        }
        
        // 监听音乐结束事件，确保循环可靠
        audio.addEventListener('ended', function() {
            if (musicEnabled) {
                this.currentTime = 0;
                this.play().catch(() => {});
            }
        });
        
        function toggleSakura() {
            sakuraEnabled = !sakuraEnabled;
            document.querySelector('.sakura-toggle').textContent = sakuraEnabled ? '🌸' : '✖️';
            if (!sakuraEnabled) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }
        
        const canvas = document.getElementById('sakura-canvas');
        const ctx = canvas.getContext('2d');
        let sakuras = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        class Sakura {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -100;
                this.size = Math.random() * 8 + 4;
                this.speedY = Math.random() * 2 + 1;
                this.speedX = Math.random() * 1 - 0.5;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 2 - 1;
                this.opacity = Math.random() * 0.5 + 0.3;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX + Math.sin(this.y * 0.01) * 0.5;
                this.rotation += this.rotationSpeed;
                if (this.y > canvas.height + 10) this.reset();
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = `hsl(340, 80%, ${70 + Math.random() * 20}%)`;
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const angle = (i * 72) * Math.PI / 180;
                    const x = Math.cos(angle) * this.size;
                    const y = Math.sin(angle) * this.size * 0.6;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }
        
        canvas.addEventListener('mousemove', function(e) {
            if (!sakuraEnabled) return;
            for (let i = 0; i < 3; i++) {
                const s = new Sakura();
                s.x = e.clientX + Math.random() * 50 - 25;
                s.y = e.clientY + Math.random() * 50 - 25;
                sakuras.push(s);
            }
        });
        
        function animateSakura() {
            if (sakuraEnabled) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (sakuras.length < 50) {
                    for (let i = 0; i < 3; i++) sakuras.push(new Sakura());
                }
                sakuras.forEach(s => { s.update(); s.draw(); });
            }
            requestAnimationFrame(animateSakura);
        }
        animateSakura();
        
        // 初始化
        if (localStorage.getItem('theme') === 'dark') {
            document.body.dataset.theme = 'dark';
            document.querySelector('.theme-toggle').textContent = '☀️';
        }
        
        if (localStorage.getItem('musicEnabled') === 'true') {
            musicEnabled = true;
            const btn = document.getElementById('musicToggle');
            btn.classList.add('playing');
            btn.textContent = '🔊';
            // 音乐播放需要用户交互，所以不自动播放
        }
        
        updateStats();
        renderRanking();
        renderAnimes();
    </script>
</body>
</html>
